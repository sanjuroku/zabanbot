<style>
:root {
  --ink: #12100e;
  --ink2: #2d2820;
  --paper: #fdf8f0;
  --cream: #f5ede0;
  --gold: #c8920a;
  --gold-text: #b45309;
  --gold-light: #f5d472;
  --gold-pale: #faeec8;
  --muted: #8c7a5e;
  --border: rgba(180,140,60,0.22);
  --border-strong: rgba(180,140,60,0.45);
  --tag-bg: #f0e4c8;
  --sans: 'Noto Sans SC', 'DM Sans', 'Microsoft YaHei', sans-serif;
  --serif: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.65;
  font-size: 15px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 0;
}

a { color: var(--gold-text); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── Cat-kaomoji cursor ─── */
body {
  cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='48' height='48'%3E%3Ctext x='24' y='19' font-size='13' font-weight='bold' text-anchor='middle' fill='%23b45309'%3E%E2%88%A7,,,%E2%88%A7%3C/text%3E%3Ctext x='24' y='34' font-size='11' font-weight='bold' text-anchor='middle' textLength='44' lengthAdjust='spacingAndGlyphs' fill='%23b45309'%3E(%3D%E2%80%A2%CF%89%E2%80%A2%3D)%3C/text%3E%3C/svg%3E") 24 24, auto;
}
a, button, [onclick] {
  cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='48' height='48'%3E%3Cg transform='rotate(-18 24 24)'%3E%3Ctext x='24' y='19' font-size='13' font-weight='bold' text-anchor='middle' fill='%23b45309'%3E%E2%88%A7,,,%E2%88%A7%3C/text%3E%3Ctext x='24' y='34' font-size='11' font-weight='bold' text-anchor='middle' textLength='44' lengthAdjust='spacingAndGlyphs' fill='%23b45309'%3E(%3D%E2%80%A2%CF%89%E2%80%A2%3D)%3C/text%3E%3C/g%3E%3C/svg%3E") 24 24, pointer;
}
footer {
  cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='48' height='48'%3E%3Ctext x='24' y='19' font-size='13' font-weight='bold' text-anchor='middle' fill='%23f5ede0'%3E%E2%88%A7,,,%E2%88%A7%3C/text%3E%3Ctext x='24' y='34' font-size='11' font-weight='bold' text-anchor='middle' textLength='44' lengthAdjust='spacingAndGlyphs' fill='%23f5ede0'%3E(%3D%E2%80%A2%CF%89%E2%80%A2%3D)%3C/text%3E%3C/svg%3E") 24 24, auto;
}
footer a, footer button {
  cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='48' height='48'%3E%3Cg transform='rotate(-18 24 24)'%3E%3Ctext x='24' y='19' font-size='13' font-weight='bold' text-anchor='middle' fill='%23f5ede0'%3E%E2%88%A7,,,%E2%88%A7%3C/text%3E%3Ctext x='24' y='34' font-size='11' font-weight='bold' text-anchor='middle' textLength='44' lengthAdjust='spacingAndGlyphs' fill='%23f5ede0'%3E(%3D%E2%80%A2%CF%89%E2%80%A2%3D)%3C/text%3E%3C/g%3E%3C/svg%3E") 24 24, pointer;
}

/* ─── Paw print click effect ─── */
.paw-pop {
  position: fixed;
  z-index: 10001;
  pointer-events: none;
  color: var(--gold-text);
  font-weight: 700;
  font-size: 1rem;
  opacity: 0;
  animation: paw-fade 0.9s ease-out forwards;
}
.paw-pop.paw-dark { color: var(--gold-light); }
@keyframes paw-fade {
  0%   { opacity: 0; transform: scale(0.4) rotate(var(--rot)); }
  25%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.25) rotate(var(--rot)) translateY(-14px); }
}
@media (prefers-reduced-motion: reduce) {
  .paw-pop { animation: none; }
}

/* ─── NAV ─── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center;
  padding: 0 2.5rem;
  height: 54px;
  background: rgba(253,248,240,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  display: flex; align-items: center; gap: 0.4rem;
  font-family: var(--sans); font-size: 1rem; font-weight: 700;
  color: var(--ink2); text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.nav-brand:hover { text-decoration: none; }
.nav-brand img { height: 28px; width: auto; }
/* 桌面：链接 + 语言切换并排靠右；移动端折叠进汉堡菜单 */
.nav-menu {
  display: flex;
  align-items: center;
  margin-left: auto;
}
.nav-toggle {
  display: none;
  background: transparent;
  border: none;
  font-size: 1.4rem;
  line-height: 1;
  color: var(--ink2);
  padding: 0.3rem 0.4rem;
  margin-left: auto;
}
nav ul {
  list-style: none;
  display: flex;
  gap: 1.5rem;
}
nav ul a {
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
nav ul a:hover { color: var(--gold-text); text-decoration: none; }

/* ─── LANG SWITCH (reused from home page) ─── */
.lang-switch {
  margin-left: 1.5rem;
  display: flex;
  border: 1px solid var(--border-strong);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}
.lang-switch button {
  background: transparent;
  border: none;
  padding: 0.6rem 0.75rem;
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--sans);
  transition: background 0.15s, color 0.15s;
}
.lang-switch button + button { border-left: 1px solid var(--border); }
.lang-switch button:hover { color: var(--gold-text); }
.lang-switch button.active { background: var(--gold-pale); color: var(--ink2); font-weight: 500; }

/* ─── PAGE HEADER ─── */
.page-header {
  border-bottom: 1px solid var(--border);
  padding: 3.5rem 2.5rem 3rem;
  position: relative;
  overflow: hidden;
}
.page-header-bg {
  position: absolute;
  top: -0.1em; right: -0.05em;
  font-family: var(--serif);
  font-size: clamp(5rem, 15vw, 12rem);
  font-style: italic;
  color: rgba(200,146,10,0.05);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}
.page-header-inner {
  position: relative;
  max-width: 860px;
  margin: 0 auto;
}
.page-eyebrow {
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.6rem;
}
.page-header h1 {
  font-family: var(--serif);
  font-size: clamp(2rem, 4vw, 3rem);
  color: var(--ink2);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 0.8rem;
}
.page-header .sub {
  font-size: 0.9rem;
  color: var(--muted);
  max-width: 560px;
}
.page-header .sub-note {
  font-size: 0.78rem;
  color: var(--muted);
  opacity: 0.7;
  margin-top: 0.45rem;
  max-width: 560px;
}
.page-header .sub-note del { text-decoration-color: var(--border-strong); }

/* ─── TIMELINE ─── */
.timeline-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 3.5rem 2.5rem 5rem;
  position: relative;
}

.tl-entry {
  position: relative;
  padding-left: 2.5rem;
  border-left: 2px solid var(--border-strong);
  margin-bottom: 4rem;
}
.tl-entry:last-child { margin-bottom: 0; }

.tl-dot {
  position: absolute;
  left: -7px; top: 0.35rem;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--paper);
  box-shadow: 0 0 0 2px var(--gold);
}

.tl-meta {
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
  margin-bottom: 2rem;
}
.tl-year {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--ink2);
  letter-spacing: -0.03em;
  line-height: 1;
}
.tl-badge {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-text);
  background: var(--gold-pale);
  border: 1px solid rgba(180,140,60,0.3);
  padding: 0.2rem 0.6rem;
  border-radius: 3px;
}

/* ─── SECTIONS ─── */
.tl-section { margin-bottom: 2.25rem; }
.tl-section:last-child { margin-bottom: 0; }
.tl-section h2 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink2);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

/* ─── CMD GRID ─── */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 0.6rem;
}
.cmd-item {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.7rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.cmd-header {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.2rem;
}
.cmd-emoji { font-size: 1rem; line-height: 1; flex-shrink: 0; }
.cmd-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--ink2);
  font-family: 'Consolas', 'SF Mono', monospace;
  letter-spacing: 0.01em;
}
.cmd-desc {
  font-size: 0.77rem;
  color: var(--muted);
  line-height: 1.5;
}

/* ─── BULLET LIST ─── */
.tl-list {
  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.tl-list li {
  font-size: 0.9rem;
  color: #3d3428;
  padding-left: 1.3rem;
  position: relative;
  line-height: 1.6;
}
.tl-list li::before {
  content: '·';
  position: absolute;
  left: 0.35rem;
  color: var(--gold);
  font-weight: 700;
}

code {
  background: var(--ink2);
  color: var(--gold-light);
  padding: 0.1rem 0.42rem;
  border-radius: 3px;
  font-size: 0.78rem;
  font-family: 'Consolas', 'SF Mono', monospace;
  letter-spacing: 0.02em;
}

/* ─── FOOTER ─── */
footer {
  background: var(--ink2);
  border-top: 1px solid var(--border);
  padding: 1.6rem 2.5rem;
  color: rgba(255,255,255,0.35);
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.75rem;
}
footer a { color: rgba(255,255,255,0.45); }
footer a:hover { color: var(--gold-light); text-decoration: none; }
.footer-links { display: flex; gap: 1.5rem; }

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  nav { padding: 0 1.25rem; }
  /* 移动端：链接行收进汉堡菜单，点 ☰ 下拉展开 */
  .nav-toggle { display: block; }
  .nav-menu {
    display: none;
    position: fixed;
    top: 54px; left: 0; right: 0;
    flex-direction: column;
    align-items: stretch;
    gap: 0.25rem;
    margin-left: 0;
    padding: 0.5rem 1.25rem 1rem;
    background: rgba(253,248,240,0.98);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 8px 20px rgba(120,90,30,0.08);
  }
  .nav-menu.open { display: flex; }
  .nav-menu ul { flex-direction: column; gap: 0; width: 100%; }
  .nav-menu ul a { display: block; padding: 0.7rem 0.2rem; font-size: 0.95rem; }
  .lang-switch { margin-left: 0; margin-top: 0.5rem; align-self: flex-start; }
  .page-header { padding: 2.5rem 1.25rem 2rem; }
  .timeline-wrap { padding: 2.5rem 1.25rem 4rem; }
  .tl-entry { padding-left: 1.5rem; }
  footer { padding: 1.5rem 1.25rem; flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .cmd-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 360px) {
  .cmd-grid { grid-template-columns: 1fr; }
}
</style>
</head>

/* ─── 渲染（desc / list item 允许内嵌 <code>/<a>，按 HTML 插入） ─── */

function renderTimeline(base) {
  const html = YEARS.map(y => {
    const badge = UI[y.badge][base] || UI[y.badge].zh;
    const secs = y.sections.map(sec => {
      const head = sec.h[base] || sec.h.zh;
      let body;
      if (sec.type === "cards") {
        body = '<div class="cmd-grid">' + sec.items.map(it => {
          const d = it.desc[base] || it.desc.zh;
          return '<div class="cmd-item"><div class="cmd-header"><span class="cmd-emoji">' + it.emoji +
            '</span><span class="cmd-name">' + it.name + '</span></div><span class="cmd-desc">' + d + '</span></div>';
        }).join("") + '</div>';
      } else {
        body = '<ul class="tl-list">' + sec.items.map(it => {
          const d = it[base] || it.zh;
          return '<li>' + d + '</li>';
        }).join("") + '</ul>';
      }
      return '<div class="tl-section"><h2>' + head + '</h2>' + body + '</div>';
    }).join("");
    return '<div class="tl-entry"><div class="tl-dot"></div><div class="tl-meta">' +
      '<span class="tl-year">' + y.year + '</span><span class="tl-badge">' + badge + '</span></div>' +
      secs + '</div>';
  }).join("");
  document.getElementById("timeline").innerHTML = html;
}

/* ─── 繁体：简体源 + OpenCC（opencc-js，CDN 懒加载）转换页面文本节点 ───
   品牌名「咋办」随 OpenCC 一并转为「咋辦」（与首页一致；bot 已支持繁体触发，输入经 to_simplified 归一化兜底）。
   补签/连签/断签 修正对齐 bot utils/i18n.py 的 _S2T_FIXUPS。 */
let _twConv = null, _twLoading = null;
function _loadTw() {
  if (_twConv) return Promise.resolve(_twConv);
  if (_twLoading) return _twLoading;
  _twLoading = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js";
    s.onload = () => {
      const c = OpenCC.Converter({ from: "cn", to: "twp" });
      _twConv = t => c(t).replaceAll("補籤", "補簽").replaceAll("連籤", "連簽").replaceAll("斷籤", "斷簽");
      resolve(_twConv);
    };
    s.onerror = () => { _twLoading = null; reject(new Error("opencc-js load failed")); };
    document.head.appendChild(s);
  });
  return _twLoading;
}
function _twConvertDom(conv) {
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
  let n;
  while ((n = walker.nextNode())) {
    const t = n.nodeValue;
    if (/[一-鿿]/.test(t)) {
      const c = conv(t);
      if (c !== t) n.nodeValue = c;
    }
  }
}

let currentLang = "zh";
function setText(id, key, base) { const el = document.getElementById(id); if (el) el.textContent = UI[key][base] || UI[key].zh; }

function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem("site_lang", lang);
  document.documentElement.lang = lang === "zh" ? "zh-CN" : (lang === "tw" ? "zh-TW" : lang);
  const base = lang === "tw" ? "zh" : lang;   // 繁体先按简体渲染，再整页转换

  document.title = UI.title[base] || UI.title.zh;
  setText("cl-h1", "h1", base);
  setText("cl-sub", "sub", base);
  document.getElementById("cl-note").innerHTML = UI.note[base] || UI.note.zh;  // innerHTML：zh 含 <del> 删除线
  setText("nav-home", "navHome", base);
  setText("nav-privacy", "navPrivacy", base);
  setText("nav-terms", "navTerms", base);
  setText("ft-home", "ftHome", base);
  setText("ft-privacy", "ftPrivacy", base);
  setText("ft-terms", "ftTerms", base);
  renderTimeline(base);

  document.querySelectorAll("#lang-switch button").forEach(b =>
    b.classList.toggle("active", b.dataset.lang === lang)
  );

  if (lang === "tw") {
    _loadTw()
      .then(conv => { if (currentLang === "tw") _twConvertDom(conv); })
      .catch(e => console.warn("繁体转换器加载失败，维持简体显示", e));
  }
}

document.querySelectorAll("#lang-switch button").forEach(b =>
  b.addEventListener("click", () => applyLang(b.dataset.lang))
);

/* 移动端汉堡菜单：点 ☰ 下拉展开 / 收起；点链接后自动收起（切换语言不收起，方便对比） */
(() => {
  const tog = document.getElementById("nav-toggle");
  const menu = document.getElementById("nav-menu");
  if (!tog || !menu) return;
  tog.addEventListener("click", () => {
    const open = menu.classList.toggle("open");
    tog.setAttribute("aria-expanded", open ? "true" : "false");
    tog.textContent = open ? "✕" : "☰";
  });
  menu.querySelectorAll("a").forEach(a => a.addEventListener("click", () => {
    menu.classList.remove("open");
    tog.setAttribute("aria-expanded", "false");
    tog.textContent = "☰";
  }));
})();

/* 初始渲染：与官网共享 localStorage("site_lang") */
const savedLang = localStorage.getItem("site_lang");
applyLang((savedLang === "en" || savedLang === "ja" || savedLang === "tw") ? savedLang : "zh");

/* ─── 点击撒猫爪（与官网一致） ─── */
document.addEventListener("click", e => {
  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const dark = !!e.target.closest("footer");
  for (let i = 0; i < 6; i++) {
    const s = document.createElement("span");
    s.className = "paw-pop" + (dark ? " paw-dark" : "");
    s.textContent = "ฅ";
    s.style.left = e.clientX + (Math.random() * 120 - 60) + "px";
    s.style.top  = e.clientY + (Math.random() * 70 - 35) + "px";
    s.style.setProperty("--rot", (Math.random() * 60 - 30).toFixed(0) + "deg");
    s.style.animationDelay = (i * 40) + "ms";
    s.addEventListener("animationend", () => s.remove());
    document.body.appendChild(s);
